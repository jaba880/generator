<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSSD | Программа «Возвращение домой»</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --accent-color: #c5a059; /* Золотой */
            --text-color: #e8e6e3;
            --input-bg: #2a2a2a;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Шапка сайта */
        .header {
            background: #000;
            border-bottom: 2px solid var(--accent-color);
            padding: 15px 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            background: var(--accent-color); /* Заглушка под лого */
            border-radius: 50%;
        }

        .header-title h1 {
            font-size: 18px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-title p {
            font-size: 12px;
            margin: 0;
            color: var(--accent-color);
            font-style: italic;
        }

        /* Контент */
        .container {
            max-width: 900px;
            margin: 40px auto;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .section-title {
            background: rgba(197, 160, 89, 0.1);
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            color: var(--accent-color);
            margin: 20px 0;
            border-left: 4px solid var(--accent-color);
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--accent-color);
            outline: none;
            background: #333;
        }

        .btn-submit {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #d4b475;
            letter-spacing: 2px;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-logo">
            <div class="logo-img"></div> <!-- Сюда вставь тег <img> со своим лого LSSD -->
            <div class="header-title">
                <h1>Департамент Шерифа Лос-Сантоса</h1>
                <p>A Tradition of Service</p>
            </div>
        </div>
        <div style="font-size: 12px; color: var(--accent-color);">Служба спасения: экстренные службы</div>
    </header>

    <div class="container">
        <h2>Программа «Возвращение домой»</h2>

        <div class="section-title">1. Информация о прошлых местах игры</div>
        
        <div class="form-group">
            <label>1.1. НИК-НЕЙМ ВАШЕГО ДЕЙСТВУЮЩЕГО ПЕРСОНАЖА:</label>
            <input type="text" placeholder="Заполнить...">
        </div>

        <div class="form-group">
            <label>1.2. ПРОЕКТЫ, СООБЩЕСТВА И СЕРВЕРА, ГДЕ ВЫ ИГРАЛИ:</label>
            <textarea rows="4" placeholder="Развернутый ответ..."></textarea>
        </div>

        <div class="form-group">
            <label>1.3. ЗВАНИЕ, ДОЛЖНОСТЬ И ОТДЕЛ:</label>
            <input type="text" placeholder="Заполнить...">
        </div>

        <div class="section-title">2. ИНФОРМАЦИЯ О ПОДАЮЩЕМ ЗАЯВЛЕНИЕ</div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>2.1. ВАШ ВОЗРАСТ:</label>
                <input type="text" placeholder="Заполнить...">
            </div>
            <div class="form-group">
                <label>2.2. ССЫЛКА НА ВКОНТАКТЕ:</label>
                <input type="text" placeholder="://vk.com...">
            </div>
        </div>

        <button class="btn-submit">Сгенерировать код заявки</button>
        
        <p class="footer-note">LSSD Recruitment Division © 2026</p>
    </div>

</body>
</html>
