<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LSSD - Back Home Program</title>
    <style>
        /* Основная палитра со скрина */
        :root {
            --dark-green: #0a140a; /* Очень темный зеленый фон */
            --header-green: #142114; /* Зеленый для шапки */
            --gold-text: #c5a059; /* Золотистый текст заголовков */
            --white-text: #d0d0d0; /* Беловатый текст вопросов */
            --input-bg: #1a1a1a; /* Цвет полей ввода */
            --border-color: #2c3e2c; /* Цвет рамок */
        }

        body {
            background-color: var(--dark-green);
            color: var(--white-text);
            font-family: "Times New Roman", Times, serif; /* На форумах часто такой шрифт */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            border: 1px solid var(--border-color);
            background-color: #000; /* Черные блоки как на скрине */
        }

        .header {
            background-color: var(--header-green);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--gold-text);
        }

        .header h1 {
            color: var(--white-text);
            margin: 0;
            font-size: 22px;
            text-transform: uppercase;
        }

        .section-title {
            background-color: var(--header-green);
            color: var(--gold-text);
            text-align: center;
            padding: 10px;
            font-weight: bold;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            font-size: 14px;
        }

        .content {
            padding: 20px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        label {
            font-size: 13px;
            font-weight: bold;
            color: var(--white-text);
            white-space: nowrap;
        }

        input, textarea {
            background-color: var(--input-bg);
            border: 1px solid #333;
            color: #888;
            padding: 5px 10px;
            flex-grow: 1;
            font-style: italic;
        }

        textarea {
            width: 100%;
            margin-top: 5px;
            resize: vertical;
        }

        .btn-box {
            text-align: center;
            padding: 20px;
        }

        .generate-btn {
            background-color: #fff; /* Белая кнопка как на скрине внизу */
            color: #000;
            border: none;
            padding: 8px 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #output {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
            background: #111;
            color: #00ff00;
            padding: 15px;
            display: none;
            border: 1px dashed var(--gold-text);
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Программа «Возвращение домой»</h1>
    </div>

    <div class="section-title">1. ИНФОРМАЦИЯ О ПРОШЛЫХ МЕСТАХ ИГРЫ</div>

    <div class="content">
        <div class="form-row">
            <label>1.1. НИК-НЕЙМ ВАШЕГО ДЕЙСТВУЮЩЕГО ПЕРСОНАЖА:</label>
            <input type="text" id="nick" placeholder="Заполнить">
        </div>

        <div style="margin-bottom: 15px;">
            <label>1.2. ПРОЕКТЫ, СООБЩЕСТВА И СЕРВЕРА, ГДЕ ВЫ ИГРАЛИ:</label>
            <textarea id="exp" rows="3" placeholder="Развернутый ответ..."></textarea>
        </div>

        <div class="form-row">
            <label>1.3. ЗВАНИЕ, ДОЛЖНОСТЬ И ПОДРАЗДЕЛЕНИЕ:</label>
            <input type="text" id="rank" placeholder="Заполнить">
        </div>

        <div class="form-row">
            <label>1.4. ПРИЧИНА УХОДА:</label>
            <input type="text" id="reason" placeholder="Заполнить">
        </div>
    </div>

    <div class="btn-box">
        <button class="generate-btn" onclick="buildBB()">Сгенерировать</button>
    </div>
</div>

<textarea id="output" readonly></textarea>

<script>
    function buildBB() {
        const nick = document.getElementById('nick').value;
        const exp = document.getElementById('exp').value;
        const rank = document.getElementById('rank').value;
        const reason = document.getElementById('reason').value;

        // Формируем BB-код в классическом стиле SAMP форумов
        const res = `[CENTER][IMG]ТВОЯ_ССЫЛКА_НА_ЛОГО_LSSD[/IMG][/CENTER]\n` +
                    `[FONT=times new roman][SIZE=4]\n` +
                    `[B]1.1. НИК-НЕЙМ:[/B] ${nick}\n` +
                    `[B]1.2. ПРОШЛЫЙ ОПЫТ:[/B] ${exp}\n` +
                    `[B]1.3. ЗВАНИЕ/ОТДЕЛ:[/B] ${rank}\n` +
                    `[B]1.4. ПРИЧИНА УХОДА:[/B] ${reason}\n` +
                    `[/SIZE][/FONT]`;

        const out = document.getElementById('output');
        out.value = res;
        out.style.display = 'block';
    }
</script>

</body>
</html>
