<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор заявок | San Fierro Police Department</title>
    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --accent-blue: #2c3e50;
            --border-gold: #c5a059;
            --text-white: #e0e0e0;
            --input-bg: #2a2a2a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-white);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 800px;
            background-color: var(--container-bg);
            border: 1px solid #333;
            border-top: 4px solid var(--border-gold);
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        header {
            text-align: center;
            border-bottom: 1px solid var(--accent-blue);
            margin-bottom: 25px;
            padding-bottom: 10px;
        }

        h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        h2 { font-size: 18px; color: var(--border-gold); margin-top: 20px; border-left: 4px solid var(--border-gold); padding-left: 10px;}

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 14px; color: #bbb; }

        input, textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            transition: border 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--border-gold);
        }

        .btn-generate {
            background-color: var(--border-gold);
            color: black;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            transition: opacity 0.3s;
        }

        .btn-generate:hover { opacity: 0.8; }

        #result-container {
            margin-top: 30px;
            display: none;
        }

        #result-text {
            width: 100%;
            height: 200px;
            font-family: monospace;
            background: #000;
            color: #00ff00;
            padding: 15px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Департамент полиции Сан-Фиерро</h1>
        <p>Программа «Возвращение домой»</p>
    </header>

    <form id="applicationForm">
        <h2>1. Информация о прошлых местах игры</h2>
        
        <div class="form-group">
            <label>1.1. НИК-НЕЙМ ВАШЕГО ДЕЙСТВУЮЩЕГО ПЕРСОНАЖА:</label>
            <input type="text" id="nickname" placeholder="Name_Surname" required>
        </div>

        <div class="form-group">
            <label>1.2. ПРОЕКТЫ, СООБЩЕСТВА И СЕРВЕРА, ГДЕ ВЫ ИГРАЛИ:</label>
            <textarea id="experience" rows="4" placeholder="Развернутый ответ..."></textarea>
        </div>

        <div class="form-group">
            <label>1.3. ЗВАНИЕ, ДОЛЖНОСТЬ И ОТДЕЛ:</label>
            <input type="text" id="rank" placeholder="Например: Sergeant II, GED">
        </div>

        <div class="form-group">
            <label>1.4. ПРИЧИНА УХОДА:</label>
            <input type="text" id="leave_reason" placeholder="ПСЖ / Расформирование и т.д.">
        </div>

        <h2>2. Информация о подающем заявление</h2>
        
        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;">
                <label>2.1. ВАШ ВОЗРАСТ:</label>
                <input type="text" id="age" placeholder="18">
            </div>
            <div class="form-group" style="flex: 2;">
                <label>2.2. ССЫЛКА НА ВКОНТАКТЕ:</label>
                <input type="text" id="vk_link" placeholder="://vk.com...">
            </div>
        </div>

        <button type="button" class="btn-generate" onclick="generateBBCode()">Сгенерировать код для форума</button>
    </form>

    <div id="result-container">
        <h3>Готовый код:</h3>
        <textarea id="result-text" readonly></textarea>
        <p style="font-size: 12px; color: #888; margin-top: 5px;">Скопируйте этот текст и вставьте в свою тему на форуме.</p>
    </div>
</div>

<script>
    function generateBBCode() {
        const nickname = document.getElementById('nickname').value;
        const experience = document.getElementById('experience').value;
        const rank = document.getElementById('rank').value;
        const reason = document.getElementById('leave_reason').value;
        const age = document.getElementById('age').value;
        const vk = document.getElementById('vk_link').value;

        // Формируем BB-код (стилистику можно менять под требования форума)
        const bbCode = `[CENTER][B]ЗАЯВЛЕНИЕ НА ВОЗВРАЩЕНИЕ ДОМОЙ[/B][/CENTER]\n\n` +
            `[B]1.1. Ник-нейм:[/B] ${nickname}\n` +
            `[B]1.2. Прошлый опыт:[/B] ${experience}\n` +
            `[B]1.3. Звание и отдел:[/B] ${rank}\n` +
            `[B]1.4. Причина ухода:[/B] ${reason}\n\n` +
            `[B]2.1. Возраст:[/B] ${age}\n` +
            `[B]2.2. Связь (VK):[/B] ${vk}`;

        document.getElementById('result-text').value = bbCode;
        document.getElementById('result-container').style.display = 'block';
        
        // Автоматическая прокрутка к результату
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
