<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />

<!-- Подключение Bootstrap CSS -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9Jv7kZXlG9F1D"
      crossorigin="anonymous" />

<!-- Подключение Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

<!-- jQuery UI CSS -->
<link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css" />

<title>Программа возвращения домой | LSSD</title>

<style>
/* Настройка цветов под LSSD */
.navbar-main { background-color: #1b3022 !important; border-bottom: 3px solid #c5a059; }
.topbar { background-color: #142118 !important; border-bottom: 1px solid #c5a059; }
.department-name { color: white; font-weight: bold; text-transform: uppercase; line-height: 1.2; margin-left: 45px; }
.department-name span { display: block; font-size: 0.7rem; color: #c5a059; font-style: italic; }
.sfpd-nav-link { color: rgba(255,255,255,0.8) !important; }
.sfpd-nav-link.active { color: #c5a059 !important; }
.logo-container { position: absolute; left: -60px; top: -15px; z-index: 100; }
</style>
</head>
<body>

<header class="sfpd-header">
    <nav class="topbar d-flex justify-content-between align-items-center px-3 px-md-4">
        <div class="d-flex align-items-center text-white">
            <img src="https://yourdomain.com/path/to/logo.png" height="25" width="25" class="mr-2" alt="Герб">
            <b>LOS SANTOS COUNTY</b>
        </div>
        <div class="d-flex align-items-center text-white" style="font-size: 0.9rem;">
            <i class="fas fa-phone-alt mr-2"></i>
            Для экстренных вызовов: 
            <span class="emergency__number" style="color: #ff4d4d; font-weight: bold; margin-left: 5px;">emergency services</span>
        </div>
    </nav>

    <nav class="navbar navbar-expand-lg navbar-main shadow-sm">
        <div class="container position-relative">
            <div class="logo-container">
                <img src="https://yourdomain.com/path/to/logo.png" height="90" alt="Логотип LSSD">
            </div>

            <a href="/" class="navbar-brand sfpd-brand">
                <div class="department-name">
                    Los Santos County Sheriff's Department
                    <span><i>A Tradition of Service</i></span>
                </div>
            </a>

            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Переключить навигацию">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link sfpd-nav-link" href="#"><i class="fas fa-shield-alt mr-2"></i>Офицерам</a></li>
                    <li class="nav-item"><a class="nav-link sfpd-nav-link active" href="#"><i class="fas fa-users mr-2"></i>Гражданам</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<br>

<div class="container">
    <div class="form" style="border: 1px solid #1b3022; padding: 10px; background-color: white; color: black;">
        <table width="100%">
            <tbody>
                <tr>
                    <td style="text-align: center; width:100%;">
                        <div style="font-weight: bold; font-size: 25px;">Программа «Возвращение домой»</div>
                    </td>
                </tr>
            </tbody>
        </table>
        <div style="border-bottom: 2px solid #1b3022; padding: 1px; margin-bottom: 15px;"></div>

        <div style="padding: 5px; background-color: #1b3022; color: #FFFFFF; text-align: center; font-weight: bold;">
            1. ИНФОРМАЦИЯ О ПРОШЛЫХ МЕСТАХ ИГРЫ
        </div>

        <form method="POST" action="#">
            <div style="border: 1px solid #000; padding: 15px; margin-top: 5px;">
                <div class="form-group">
                    <label for="nickname" style="font-weight: bold; font-size: 90%;">1.1. НИК-НЕЙМ ВАШЕГО ДЕЙСТВУЮЩЕГО ПЕРСОНАЖА:</label>
                    <input type="text" id="nickname" name="nickname" class="form-control mb-3" placeholder="Заполнить" required>
                </div>

                <div class="form-group">
                    <label for="projects" style="font-weight: bold; font-size: 90%;">1.2. ПРОЕКТЫ, СООБЩЕСТВА И СЕРВЕРА, ГДЕ ВЫ ИГРАЛИ:</label>
                    <textarea id="projects" name="projects" class="form-control mb-3" placeholder="Развернутый ответ..." rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="history" style="font-weight: bold; font-size: 90%;">1.3. ЗВАНИЕ, ДОЛЖНОСТЬ И ПОДРАЗДЕЛЕНИЕ:</label>
                    <input type="text" id="history" name="history" class="form-control mb-3" placeholder="Заполнить" required>
                </div>

                <div class="form-group">
                    <label for="leave_reason" style="font-weight: bold; font-size: 90%;">1.4. ПРИЧИНА УХОДА:</label>
                    <input type="text" id="leave_reason" name="leave_reason" class="form-control mb-3" placeholder="Заполнить" required>
                </div>
            </div>

            <br>
            <div style="text-align: center;">
                <button type="submit" class="btn btn-primary">Отправить</button>
            </div>
        </form>
    </div>
</div>

<!-- Скрипты jQuery и Bootstrap -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"
        integrity="sha256-K+ct6c7NcyQEc/n4LtXfU66kXsdzbuFrrcNf7hDtYxY="
        crossorigin="anonymous"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.bundle.min.js"
        integrity="sha384-ho+j7jyWK8fNQe+A12zVxE3ZPVITe4LBfofw9esj+Xwa7vOlbjxj/Equ9I4P4HI"
        crossorigin="anonymous"></script>

</body>
</html>
