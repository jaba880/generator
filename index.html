
<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <title>Программа возвращения домой | LSSD</title>
    
    <style>
        /* Стили LSSD */
        :root {
            --lssd-green: #1b3022;
            --lssd-gold: #c5a059;
            --lssd-dark: #142118;
        }

        body { background-color: #f8f9fa; }

        .sfpd-header .topbar { 
            background-color: var(--lssd-dark); 
            border-bottom: 2px solid var(--lssd-gold); 
            padding: 5px 0;
        }

        .navbar-main { 
            background-color: var(--lssd-green) !important; 
            border-bottom: 3px solid var(--lssd-gold); 
            min-height: 85px;
        }

        .department-name { 
            color: white; 
            font-weight: bold; 
            text-transform: uppercase; 
            line-height: 1.2; 
            margin-left: 90px;
        }

        .department-name span { 
            display: block; 
            font-size: 0.75rem; 
            color: var(--lssd-gold); 
            font-style: italic;
            letter-spacing: 1px;
        }

        .logo-container {
            position: absolute;
            left: 15px;
            top: -15px;
            z-index: 100;
        }

        .sfpd-nav-link { color: rgba(255,255,255,0.9) !important; font-weight: 500; font-size: 0.9rem; }
        .sfpd-nav-link:hover { color: var(--lssd-gold) !important; }

        .form-box {
            background: white;
            border: 1px solid var(--lssd-green);
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .section-title {
            background-color: var(--lssd-green);
            color: white;
            text-align: center;
            padding: 8px;
            font-weight: bold;
            text-transform: uppercase;
            margin: 20px 0 15px 0;
        }

        .field-label { font-weight: bold; font-size: 0.85rem; color: #444; margin-bottom: 5px; display: block; }
        .form-control { border-radius: 0; border: 1px solid #ccc; }
        
        .btn-lssd {
            background-color: var(--lssd-green);
            color: white;
            border: 2px solid var(--lssd-gold);
            font-weight: bold;
            width: 100%;
            padding: 12px;
            transition: 0.3s;
        }

        .btn-lssd:hover { background-color: var(--lssd-dark); color: var(--lssd-gold); }
    </style>
</head>

<body>

<header class="sfpd-header">
    <nav class="topbar">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center text-white">
                <img src="https://sd.ls-services.ru" height="25" class="mr-2" alt="SIB">
                <b style="font-size: 0.8rem; letter-spacing: 1px;">LOS SANTOS COUNTY</b>
            </div>
            <div class="text-white" style="font-size: 0.85rem;">
                <i class="fas fa-phone-alt mr-2" style="color: var(--lssd-gold);"></i>
                Для экстренных вызовов: <span style="color: #ff4d4d; font-weight: bold;">emergency services</span>
            </div>
        </div>
    </nav>

    <nav class="navbar navbar-expand-lg navbar-main shadow-sm">
        <div class="container position-relative">
            <div class="logo-container">
                <img src="https://sd.ls-services.ru" height="105" alt="LSSD Logo">
            </div>
            
            <div class="department-name">
                Los Santos County Sheriff's Department
                <span>A Tradition of Service</span>
            </div>
            
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item"><a class="nav-link sfpd-nav-link" href="#"><i class="fas fa-shield-alt mr-1"></i> Департамент</a></li>
                    <li class="nav-item"><a class="nav-link sfpd-nav-link" href="#"><i class="fas fa-users mr-1"></i> Гражданам</a></li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<div class="container mb-5">
    <div class="form-box">
        <h2 style="text-align: center; color: var(--lssd-green); font-weight: bold; margin-bottom: 0;">ПРОГРАММА «ВOЗВРАЩЕНИЕ ДОМОЙ»</h2>
        <p style="text-align: center; color: #666; font-size: 0.9rem;">Los Santos County Sheriff's Department</p>

        <div class="section-title">1. ИНФОРМАЦИЯ О ПРОШЛОЙ ИГРЕ</div>
        
        <div class="row">
            <div class="col-12 mb-3">
                <label class="field-label">1.1. НИК-НЕЙМ ВАШЕГО ДЕЙСТВУЮЩЕГО ПЕРСОНАЖА:</label>
                <input type="text" id="nick" class="form-control" placeholder="Nick_Name">
            </div>
            <div class="col-12 mb-3">
                <label class="field-label">1.2. ПРОЕКТЫ И СООБЩЕСТВА, ГДЕ ВЫ ИГРАЛИ:</label>
                <textarea id="exp" class="form-control" rows="3" placeholder="Развернутый ответ..."></textarea>
            </div>
            <div class="col-12 mb-3">
                <label class="field-label">1.3. ЗВАНИЕ, ДОЛЖНОСТЬ И ПОДРАЗДЕЛЕНИЕ:</label>
                <input type="text" id="rank" class="form-control" placeholder="Напр. Deputy Sheriff II, SEB">
            </div>
            <div class="col-12 mb-3">
                <label class="field-label">1.4. ПРИЧИНА УХОДА:</label>
                <input type="text" id="reason" class="form-control" placeholder="Заполнить">
            </div>
        </div>

        <div class="section-title">2. ИНФОРМАЦИЯ О ПОДАЮЩЕМ ЗАЯВЛЕНИЕ</div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="field-label">2.1. ВАШ ВОЗРАСТ:</label>
                <input type="number" id="age" class="form-control" placeholder="18">
            </div>
            <div class="col-md-6 mb-3">
                <label class="field-label">2.2. ССЫЛКА НА VK / DISCORD:</label>
                <input type="text" id="social" class="form-control" placeholder="://vk.com...">
            </div>
            <div class="col-12 mb-3">
                <label class="field-label">2.3. ДОКАЗАТЕЛЬСТВА ИГРЫ (ССЫЛКИ):</label>
                <input type="text" id="proof" class="form-control" placeholder="://imgur.com...">
            </div>
        </div>

        <button onclick="makeBB()" class="btn btn-lssd mt-3">СГЕНЕРИРОВАТЬ КОД ДЛЯ ФОРУМА</button>

        <div id="resultBlock" class="mt-4" style="display: none;">
            <label class="field-label">СКОПИРУЙТЕ ЭТОТ КОД И ВСТАВЬТЕ В ТЕМУ:</label>
            <textarea id="bboutput" class="form-control" rows="10" readonly style="font-family: monospace; background: #fdfdfd;"></textarea>
        </div>
    </div>
</div>

<script>
function makeBB() {
    const d = {
        n: document.getElementById('nick').value,
        e: document.getElementById('exp').value,
        r: document.getElementById('rank').value,
        rs: document.getElementById('reason').value,
        a: document.getElementById('age').value,
        s: document.getElementById('social').value,
        p: document.getElementById('proof').value
    };

    let code = `[CENTER][IMG]https://sd.ls-services.ru[/IMG]\n`;
    code += `[B][SIZE=6]BACK HOME PROGRAM[/SIZE][/B]\n`;
    code += `[COLOR=#c5a059][B]Los Santos County Sheriff's Department[/B][/COLOR][/CENTER]\n\n`;
    code += `[B]1. ИНФОРМАЦИЯ О ПРОШЛОЙ ИГРЕ[/B]\n`;
    code += `[B]1.1. Ник:[/B] ${d.n}\n`;
    code += `[B]1.2. Опыт:[/B] ${d.e}\n`;
    code += `[B]1.3. Звание/Отдел:[/B] ${d.r}\n`;
    code += `[B]1.4. Причина:[/B] ${d.rs}\n\n`;
    code += `[B]2. OOC ИНФОРМАЦИЯ[/B]\n`;
    code += `[B]2.1. Возраст:[/B] ${d.a}\n`;
    code += `[B]2.2. Связь:[/B] ${d.s}\n`;
    code += `[B]2.3. Доказательства:[/B] ${d.p}`;

    document.getElementById('bboutput').value = code;
    document.getElementById('resultBlock').style.display = 'block';
    window.scrollTo(0, document.body.scrollHeight);
}
</script>

</body>
</html>
